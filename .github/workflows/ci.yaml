name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - nightly
          - "1.85"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            index.crates.io:443
            static.crates.io:443
            static.rust-lang.org:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo test
      - run: cargo test --no-default-features
      - run: cargo test --features serde
      - run: cargo test --no-default-features --features serde

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            index.crates.io:443
            static.crates.io:443
            static.rust-lang.org:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy,rustfmt
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - name: Clippy (serde only)
        run: cargo clippy --workspace --all-targets --no-default-features --features serde -- -D warnings
      - name: Check benches
        run: cargo check --benches

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            cli.codecov.io:443
            github.com:443
            index.crates.io:443
            static.crates.io:443
            ingest.codecov.io:443
            keybase.io:443
            o26192.ingest.us.sentry.io:443
            static.rust-lang.org:443
            storage.googleapis.com:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: llvm-tools-preview
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          fail_ci_if_error: true
          use_oidc: true

  playground:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            crates.io:443
            deno.com:443
            dl.deno.land:443
            github.com:443
            index.crates.io:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            static.crates.io:443
            static.rust-lang.org:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
          cache: true
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: wasm32-unknown-unknown
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - run: deno task wasm:build
        working-directory: playground
      - run: deno fmt --check
        working-directory: playground
      - run: deno lint
        working-directory: playground
      - run: deno task test
        working-directory: playground
      - run: deno check --unstable-tsgo .
        working-directory: playground
      - run: deno task build
        working-directory: playground
        env:
          VITE_COMMIT_HASH: ${{ github.sha }}
